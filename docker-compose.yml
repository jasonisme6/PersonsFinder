version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: persons-finder-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: personsdb
    volumes:
      - mongodb_data:/data/db
    networks:
      - persons-finder-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  persons-finder-network:
    driver: bridge

volumes:
  mongodb_data:
